<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sistem Informasi Desa</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; padding: 0; }
      :root {
        --bg-primary: #ffffff;
        --bg-secondary: #f5f5f3;
        --bg-page: #f0eeea;
        --text-primary: #1a1a1a;
        --text-secondary: #666666;
        --text-tertiary: #aaaaaa;
        --border: #e5e5e3;
        --border-md: #cccccc;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-primary: #1e1e1e;
          --bg-secondary: #282828;
          --bg-page: #141414;
          --text-primary: #f0f0f0;
          --text-secondary: #aaaaaa;
          --text-tertiary: #666666;
          --border: #333333;
          --border-md: #444444;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
